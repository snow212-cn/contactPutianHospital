  tel_name: '联系人姓名'
  enable_otp: false
  chrome_options:
    no_imgs: false
    headless: false
    auto_port: true
    user_data_dir: 'C:\\Users\\<用户名>\\AppData\\Local\\Microsoft\\Edge\\User Data'
