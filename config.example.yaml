# 去重参数配置
# 说明：
# - enable_link_dedup / enable_institution_dedup：启动阶段对 api.txt 做预处理去重
# - enable_title_dedup：运行时按页面标题去重（同标题只留言一次）
deduplication:
  enable_link_dedup: true
  enable_institution_dedup: true
  enable_title_dedup: false
  show_duplicate_examples: 3

# 对话模式配置
dialogue_mode:
  # 可选模式：template（模板）, ai（AI生成）, hybrid（混合模式）
  mode: 'ai'

  # AI对话配置（仅在 mode 为 'ai' 或 'hybrid' 时生效）
  ai_config:
    provider: 'custom'
    base_url: 'https://your-api-host.example.com'
    api_key: 'YOUR_API_KEY_HERE'
    model: 'your-model-name'

    prompt_template: |
      你是一个对话生成助手，刚刚进入“{hospital_name}”的主页聊天界面，作为访客准备开始咨询，并看到对方自动发出以下的欢迎消息（对话上下文）：
      ```
      {chat_context}
      ```
      你的任务是按以下模板生成第一条简洁、得体的咨询消息，你的输出必须只能是生成的消息本身，严禁添加任何解释、建议、示例或格式符号等！

      输出模板：[问候语][称谓]，[人物][情况简述]，[联系方式]。

      要求：
      - 使用随机、礼貌的问候语及称谓；语气看起来真诚、自然。
      - 简要描述与本人或随机一位家属的紧急情况，具体细节不便打字在此交流。
      - 提供联系方式 {tel_number} {tel_name}，体现出希望通过电话沟通的紧迫需求。
      - 针对该机构的专业特点调整措辞内容，并且需要自然地承接前面的“对话上下文”(如果存在)。

    # API 请求参数配置
    request_params:
      max_tokens: 3000
      temperature: 0.7
      top_p: 1.0
      frequency_penalty: 0.5
      presence_penalty: 0.5
      reasoning: false

# 抓取新链接（catchad/catch.py）配置
# 说明：
# - 用于控制抓取速度、并发、分页、断点续传、以及写入的 api.txt 路径
# - 默认值在代码中内置；不写也能运行，写了则按此覆盖
# - 支持写在本文件（config.yaml）里，也支持单独放到 catchad/config.yaml（优先级更高）
catchad:
  # 并发线程数（太大容易触发风控）。
  max_workers: 2
  # 每个关键词抓取的搜索结果页数（pn=0,10,20...）。
  max_page: 1
  # 每页最多扫描多少条候选跳转链接：默认不设上限。只有“明确配置”了该值，会进行截断。
  candidate_links_scan_limit: 30
  # 每页要拿到多少条“唯一广告”（按解析后的 imid 去重计数）。
  # 百度页面里大量看起来不同的 baidu.php?url= 实际打开是同一广告；这些重复项不再占用 candidate_links_limit 配额。
  candidate_links_limit: 10
  # 指纹策略：对 baidu.php?url= 的 token URLDecode 后取前几位作为指纹
  candidate_fingerprint_prefix_len: 16
  # 每个关键词开始前的随机延迟区间（秒），用于降速
  delay_per_keyword_range: [2.0, 5.0]
  # 翻页之间的随机延迟区间（秒）
  delay_between_pages_range: [1.0, 3.0]
  # 解析每条候选跳转链接之间的随机延迟区间（秒）
  delay_between_resolves_range: [0.3, 1.2]
  # requests 超时（connect, read）秒
  request_timeout: [5, 10]
  # 命中百度安全验证/风控页后的动作
  # - stop: 触发全局停止，取消后续 keyword
  risk_control_action: stop
  # 断点续传：是否启用“已完成关键词”记录
  resume_enabled: true
  # 已完成关键词记录 - 支持相对路径（相对项目目录）或绝对路径
  resume_file: 'catchad/done_keywords.txt'
  # 抓取结果写入的 api.txt 路径 - 支持相对路径或绝对路径
  api_file: 'api.txt'
